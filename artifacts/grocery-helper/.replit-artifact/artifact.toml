kind = "web"
previewPath = "/"
title = "Grocery Helper"
version = "1.0.0"
id = "artifacts/grocery-helper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23558

[services.development]
run = "pnpm --filter @workspace/grocery-helper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grocery-helper", "run", "build" ]
publicDir = "artifacts/grocery-helper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23558"
BASE_PATH = "/"
